---
global:
  imageRegistry: ""

image:
  registry: quay.io
  repository: upmio/mongodb
  tag: "8.0.15"
  digest: ""
  pullPolicy: IfNotPresent

metrics:
  image:
    registry: quay.io
    repository: upmio/mongodb-exporter
    tag: "0.47.2"
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

agent:
  image:
    registry: quay.io
    repository: upmio/mongodb-agent
    tag: "8.0"
    pullPolicy: IfNotPresent
