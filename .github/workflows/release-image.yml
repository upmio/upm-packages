name: Release images
run-name: ${{ github.actor }} is building images
on:
  push:
    branches:
      - 'main'

jobs:
  determine-images:
    runs-on: ubuntu-latest
    outputs:
      image_dirs: ${{ steps.set-output.outputs.image_dirs }}
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for image changes
        id: check-changes
        run: |
          # 检查是否有 image 相关的文件变更
          if git diff --name-only HEAD^ HEAD | grep -q "image/"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Image changes detected"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No image changes detected, skipping build"
          fi

      - name: Find changed image directories
        id: set-output
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          # 获取变更的文件列表，找出对应的需要构建的 image 目录
          changed_files=$(git diff --name-only HEAD^ HEAD | grep "image/" || true)
          
          if [ -n "$changed_files" ]; then
            echo "Changed files:"
            echo "$changed_files"
            
            # 提取需要构建的 image 目录
            image_dirs_json="$(echo "$changed_files" | while read -r file; do
              if [ -n "$file" ]; then
                # 提取组件和版本信息
                dir=$(dirname "$file" | sed 's|^\./||')
                while [[ "$dir" != "." && "$dir" != *"image" ]]; do
                  dir=$(dirname "$dir")
                done
                
                if [[ "$dir" == *"image" ]]; then
                  # 获取组件和版本
                  component=$(echo "$dir" | awk -F'/' '{print $1}')
                  version=$(echo "$dir" | awk -F'/' '{print $2}')
                  
                  if [[ -n "$component" && -n "$version" ]]; then
                    echo "{\"image\": \"$component\", \"version\": \"${version}\", \"context\": \"$dir\"}"
                  fi
                fi
              fi
            done | sort | uniq | jq -sc .)"
            
            echo "Image directories to build:"
            echo "$image_dirs_json"
            echo "image_dirs=$image_dirs_json" >> $GITHUB_OUTPUT
          else
            echo "image_dirs=[]" >> $GITHUB_OUTPUT
          fi

  release-images:
    needs: determine-images
    if: needs.determine-images.outputs.has_changes == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
        max-parallel: 3
        matrix:
          chart_dir: ${{ fromJson(needs.determine-images.outputs.image_dirs) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAYIO_USERNAME }}
          password: ${{ secrets.QUAYIO_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.chart_dir.context }}
          platforms: linux/amd64
          push: true
          tags: |
            quay.io/upmio/${{ matrix.chart_dir.image }}:${{ matrix.chart_dir.version }}