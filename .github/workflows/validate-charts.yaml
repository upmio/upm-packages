name: Validate chart consistency
run-name: ${{ github.actor }} is validating chart consistency
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  validate-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq and helm
        run: |
          echo "=== Installing dependencies ==="
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          curl https://baltocdn.com/helm/signing.asc | gpg --dearmor | sudo tee /usr/share/keyrings/helm.gpg > /dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/helm.gpg] https://baltocdn.com/helm/stable/debian/ all main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          sudo apt-get update
          sudo apt-get install helm

      - name: Detect chart changes
        id: detect-changes
        run: |
          # Check for charts related file changes
          changed_files=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep "charts/" || true)
          
          if [ -n "$changed_files" ]; then
            echo "Chart changes detected:"
            echo "$changed_files"
            
            # Extract chart directories that need validation
            chart_dirs_json="$(echo "$changed_files" | while read -r file; do
              if [ -n "$file" ]; then
                # Extract charts directory
                dir=$(dirname "$file" | sed 's|^\./||')
                while [[ "$dir" != "." && "$dir" != *"charts" ]]; do
                  dir=$(dirname "$dir")
                done
                
                if [[ "$dir" == *"charts" ]]; then
                  echo "$dir"
                fi
              fi
            done | sort | uniq | jq -R . | jq -sc .)"
            
            echo "Chart directories to validate:"
            echo "$chart_dirs_json"
            echo "chart_dirs=$chart_dirs_json" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No chart changes detected"
            echo "chart_dirs=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate changed charts
        if: steps.detect-changes.outputs.has_changes == 'true'
        run: |
          echo "=== Validating changed charts ==="
          
          # Parse chart directory list and validate each one
          echo '${{ steps.detect-changes.outputs.chart_dirs }}' | jq -r '.[]' | while read -r chart_dir; do
            echo "Validating chart: $chart_dir"
            
            # Run chart validation
            if [ -f "./scripts/validate-charts.sh" ]; then
              # If script supports directory specification, use script
              ./scripts/validate-charts.sh "$chart_dir"
            else
              # Otherwise validate manually
              helm lint "$chart_dir" || {
                echo "Chart validation failed for: $chart_dir"
                exit 1
              }
            fi
          done

      - name: Validate all charts (fallback)
        if: steps.detect-changes.outputs.has_changes == 'false'
        run: |
          echo "=== No chart changes detected, running minimal validation ==="
          # Randomly select one chart for validation to ensure validation process works
          find . -name "Chart.yaml" -exec dirname {} \; | head -1 | while read chart_dir; do
            echo "Validating sample chart: $chart_dir"
            helm lint "$chart_dir" || {
              echo "Sample chart validation failed"
              exit 1
            }
          done

      - name: Check chart naming consistency
        run: |
          echo "=== Checking chart naming consistency ==="
          find . -name "Chart.yaml" -exec sh -c '
            chart_dir=$(dirname "$1")
            component=$(echo "$chart_dir" | awk -F'/' '{print $(NF-1)}')
            version=$(echo "$chart_dir" | awk -F'/' '{print $NF}')
            chart_name=$(grep "^name:" "$1" | sed "s/name: //")
            expected_name=$(echo "$component" | sed "s/-/_/g")
            
            echo "Checking $chart_dir:"
            echo "  Component: $component"
            echo "  Version: $version"
            echo "  Chart name: $chart_name"
            echo "  Expected name: $expected_name"
            
            if [[ "$chart_name" != "$expected_name" ]]; then
              echo "❌ Chart name mismatch: expected $expected_name, got $chart_name"
              exit 1
            else
              echo "✅ Chart name is correct"
            fi
          ' _ {} \;

      - name: Check for duplicate chart versions
        run: |
          echo "=== Checking for duplicate chart versions ==="
          find . -name "Chart.yaml" -exec sh -c '
            chart_dir=$(dirname "$1")
            chart_name=$(grep "^name:" "$1" | sed "s/name: //")
            chart_version=$(grep "^version:" "$1" | sed "s/version: //")
            echo "$chart_name-$chart_version"
          ' _ {} \; | sort | uniq -c | while read count chart_id; do
            if [[ "$count" -gt 1 ]]; then
              echo "❌ Duplicate chart version found: $chart_id (appears $count times)"
              exit 1
            fi
          done
          echo "✅ No duplicate chart versions found"

      - name: Check Chart.yaml completeness
        run: |
          echo "=== Checking Chart.yaml completeness ==="
          find . -name "Chart.yaml" -exec sh -c '
            chart_dir=$(dirname "$1")
            echo "Checking $chart_dir/Chart.yaml"
            
            # Check required fields
            required_fields=("name" "version" "description" "type")
            for field in "${required_fields[@]}"; do
              if ! grep -q "^$field:" "$1"; then
                echo "❌ Missing required field: $field"
                exit 1
              fi
            done
            
            # Check if it has bitnami-common dependency
            if ! grep -q "bitnami-common" "$1"; then
              echo "❌ Missing bitnami-common dependency"
              exit 1
            fi
            
            echo "✅ Chart.yaml is complete"
          ' _ {} \;

      - name: Generate validation report
        run: |
          echo "=== Validation Summary ==="
          echo "✅ All charts passed validation"
          echo "✅ Chart naming is consistent"
          echo "✅ No duplicate chart versions found"
          echo "✅ All Chart.yaml files are complete"
          
      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: chart-validation-results
          path: |
            validation-report.txt
          retention-days: 7