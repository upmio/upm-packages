name: Code Quality and Testing

run-name: ${{ github.actor }} is running code quality checks and tests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          echo "=== Installing dependencies ==="
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          
          # Install yamllint
          pip3 install yamllint
          
          # Install yq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          # Install Helm
          curl https://baltocdn.com/helm/signing.asc | gpg --dearmor | sudo tee /usr/share/keyrings/helm.gpg > /dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/helm.gpg] https://baltocdn.com/helm/stable/debian/ all main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          sudo apt-get update
          sudo apt-get install helm

      - name: Run Lint Checks
        run: |
          echo "=== Running lint checks ==="
          ./scripts/lint.sh

      - name: Run Unit Tests
        run: |
          echo "=== Running unit tests ==="
          ./scripts/test.sh unit

      - name: Run Integration Tests
        run: |
          echo "=== Running integration tests ==="
          ./scripts/test.sh integration

      - name: Run All Tests
        run: |
          echo "=== Running all tests ==="
          ./scripts/test.sh all

      - name: Validate Charts
        run: |
          echo "=== Validating charts ==="
          ./scripts/validate-charts.sh

      - name: Security Scan - Shell Scripts
        run: |
          echo "=== Security scanning shell scripts ==="
          find . -name "*.sh" -type f -not -path "./.git/*" | while read script; do
            echo "Scanning: $script"
            shellcheck --severity=warning "$script" || true
          done

      - name: Security Scan - Dockerfiles
        run: |
          echo "=== Security scanning Dockerfiles ==="
          find . -name "Dockerfile" -type f -not -path "./.git/*" | while read dockerfile; do
            echo "Scanning: $dockerfile"
            # Install and run hadolint if available
            if command -v hadolint >/dev/null 2>&1; then
              hadolint "$dockerfile" || true
            else
              echo "hadolint not available, skipping Dockerfile linting"
            fi
          done

      - name: Check File Permissions
        run: |
          echo "=== Checking file permissions ==="
          # Ensure shell scripts are executable
          find . -name "*.sh" -type f -not -path "./.git/*" | while read script; do
            if [ -x "$script" ]; then
              echo "✓ $script is executable"
            else
              echo "✗ $script is not executable"
              exit 1
            fi
          done

      - name: Check Documentation
        run: |
          echo "=== Checking documentation ==="
          # Check for required documentation files
          required_docs=("README.md" "CONTRIBUTING.md" "SECURITY.md")
          for doc in "${required_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "✓ $doc exists"
            else
              echo "✗ $doc missing"
              exit 1
            fi
          done

      - name: Generate Test Report
        run: |
          echo "=== Generating test report ==="
          echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lint checks completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Integration tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Chart validation completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security scans completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ File permissions checked" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Documentation verified" >> $GITHUB_STEP_SUMMARY

  build-test:
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine changed components
        id: find-changes
        run: |
          # Get changed files to determine components to test
          changed_files=$(git diff --name-only HEAD^ HEAD | grep "image/" || true)
          
          if [ -n "$changed_files" ]; then
            echo "Changed files in image directories:"
            echo "$changed_files"
            
            # Extract components to test
            components_json="$(echo "$changed_files" | while read -r file; do
              if [ -n "$file" ]; then
                # Extract component name
                component=$(echo "$file" | awk -F'/' '{print $1}')
                if [[ -n "$component" && "$component" != "." ]]; then
                  echo "$component"
                fi
              fi
            done | sort | uniq | jq -R . | jq -sc .)"
            
            echo "Components to test:"
            echo "$components_json"
            echo "components=$components_json" >> $GITHUB_OUTPUT
          else
            echo "No image changes detected, running minimal test"
            echo "components=[]" >> $GITHUB_OUTPUT
          fi

      - name: Test Docker Build for changed components
        if: steps.find-changes.outputs.components != '[]'
        run: |
          echo "=== Testing Docker builds for changed components ==="
          
          # Parse component list and test
          echo '${{ steps.find-changes.outputs.components }}' | jq -r '.[]' | while read -r component; do
            echo "Testing component: $component"
            
            # Find all versions for the component
            find . -path "*/${component}/*/image/Dockerfile" -type f | while read dockerfile; do
              component_dir=$(dirname "$dockerfile")
              echo "Testing build: $component_dir"
              
              # Test build without pushing
              docker build --no-cache --pull --rm -t test-build:${component} "$component_dir" || {
                echo "Build failed for: $component_dir"
                exit 1
              }
              
              # Clean up
              docker rmi test-build:${component} || true
            done
          done

      - name: Test random component if no changes
        if: steps.find-changes.outputs.components == '[]'
        run: |
          echo "=== Testing random component to validate build process ==="
          # Randomly select a component for testing to ensure build process works
          components=('mysql-community' 'postgresql' 'proxysql' 'pgbouncer' 'kafka' 'elasticsearch' 'kibana')
          random_component=${components[$RANDOM % ${#components[@]}]}
          
          echo "Testing component: $random_component"
          
          # Find a version for the component
          find . -path "*/${random_component}/*/image/Dockerfile" -type f | head -1 | while read dockerfile; do
            component_dir=$(dirname "$dockerfile")
            echo "Testing build: $component_dir"
            
            # Test build without pushing
            docker build --no-cache --pull --rm -t test-build:${random_component} "$component_dir" || {
              echo "Build failed for: $component_dir"
              exit 1
            }
            
            # Clean up
            docker rmi test-build:${random_component} || true
          done

  security-scan:
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Scan Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for Critical Vulnerabilities
        run: |
          echo "=== Checking for critical vulnerabilities ==="
          if [ -f "trivy-results.sarif" ]; then
            # Check for critical/high severity issues
            critical_count=$(grep -c '"severity": *"CRITICAL"' trivy-results.sarif || echo "0")
            high_count=$(grep -c '"severity": *"HIGH"' trivy-results.sarif || echo "0")
            
            echo "Critical vulnerabilities: $critical_count"
            echo "High vulnerabilities: $high_count"
            
            if [ "$critical_count" -gt 0 ]; then
              echo "❌ Critical vulnerabilities found!"
              exit 1
            fi
            
            if [ "$high_count" -gt 5 ]; then
              echo "⚠️  Many high vulnerabilities found ($high_count)"
              # Don't fail the build but warn
            fi
          fi

  deployment-test:
    needs: [code-quality, build-test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Kind and Helm
        run: |
          echo "=== Installing Kind and Helm ==="
          # Install Kind
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Install Helm
          curl https://baltocdn.com/helm/signing.asc | gpg --dearmor | sudo tee /usr/share/keyrings/helm.gpg > /dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/helm.gpg] https://baltocdn.com/helm/stable/debian/ all main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          sudo apt-get update
          sudo apt-get install helm

      - name: Create Kind Cluster
        run: |
          echo "=== Creating Kind cluster ==="
          kind create cluster --wait 120s
          kubectl cluster-info --context kind-kind

      - name: Test Chart Deployment
        run: |
          echo "=== Testing chart deployment ==="
          # Test a simple chart deployment
          find . -name "Chart.yaml" -exec dirname {} \; | head -1 | while read chart_dir; do
            echo "Testing deployment: $chart_dir"
            
            # Package the chart
            helm package "$chart_dir"
            
            # Install the chart
            chart_name=$(basename "$chart_dir")
            helm install test-release ./"$chart_name"*.tgz --wait --timeout 300s
            
            # Check deployment status
            helm status test-release
            
            # Uninstall the chart
            helm uninstall test-release
            
            # Clean up
            rm -f ./"$chart_name"*.tgz
          done

      - name: Cleanup Kind Cluster
        run: |
          echo "=== Cleaning up Kind cluster ==="
          kind delete cluster
        if: always()