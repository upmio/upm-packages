name: Clean up index.yaml
run-name: ${{ github.actor }} is cleaning up chart index
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  push:
    branches:
      - 'main'
    paths:
      - '**/charts/**'

jobs:
  cleanup-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git fetch --all
          git fetch --tags

      - name: Install yq
        run: |
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Get current chart versions from repository
        id: get-charts
        run: |
          # Get all chart names and versions from the repository
          charts_json="$(find . -name "Chart.yaml" -exec sh -c '
            chart_dir=$(dirname "$1")
            component=$(echo "$chart_dir" | awk -F"/" "{print $(NF-1)}")
            version=$(echo "$chart_dir" | awk -F"/" "{print $NF}")
            chart_name=$(grep "^name:" "$1" | sed "s/name: //")
            chart_version=$(grep "^version:" "$1" | sed "s/version: //")
            echo "{\"component\": \"$component\", \"version\": \"$version\", \"chart_name\": \"$chart_name\", \"chart_version\": \"$chart_version\"}"
          ' _ {} \; | jq -sc .)"
          
          echo "repository_charts=$charts_json" >> $GITHUB_OUTPUT
          echo "Repository charts found:"
          echo "$charts_json" | jq "."

      - name: Check out gh-pages branch
        run: |
          git checkout gh-pages
          git pull origin gh-pages

      - name: Get current index.yaml entries
        id: get-index-entries
        run: |
          if [[ -f "index.yaml" ]]; then
            # Get all chart entries from index.yaml
            index_entries_json="$(yq eval ".entries | keys | .[]" index.yaml | while read chart; do
              yq eval ".entries.$chart[].version" index.yaml | while read version; do
                echo "{\"chart_name\": \"$chart\", \"version\": \"$version\"}"
              done
            done | jq -sc .)"
            
            echo "index_entries=$index_entries_json" >> $GITHUB_OUTPUT
            echo "Index entries found:"
            echo "$index_entries_json" | jq "."
          else
            echo "index_entries=[]" >> $GITHUB_OUTPUT
            echo "No index.yaml found"
          fi

      - name: Find and remove non-existent charts
        id: cleanup-charts
        run: |
          # Convert repository charts to a simple lookup format
          repo_charts_lookup="$(echo "${{ steps.get-charts.outputs.repository_charts }}" | jq -r ".[] | \"\(.chart_name)-\(.chart_version)\"")"
          
          # Get charts to remove (exist in index but not in repository)
          charts_to_remove="$(echo "${{ steps.get-index-entries.outputs.index_entries }}" | jq --arg repo_charts "$repo_charts_lookup" "
            .[] | select(. as $entry | $repo_charts | contains(\"\($entry.chart_name)-\($entry.version)\") | not) | .chart_name + \"-\" + .version
          ")"
          
          echo "Charts to remove:"
          echo "$charts_to_remove"
          echo "charts_to_remove=$charts_to_remove" >> $GITHUB_OUTPUT

      - name: Remove non-existent charts from index.yaml
        if: steps.cleanup-charts.outputs.charts_to_remove != ""
        run: |
          # Remove each non-existent chart from index.yaml
          echo "${{ steps.cleanup-charts.outputs.charts_to_remove }}" | while read chart_to_remove; do
            if [[ -n "$chart_to_remove" ]]; then
              chart_name=$(echo "$chart_to_remove" | sed "s/-[^-]*$//")
              chart_version=$(echo "$chart_to_remove" | sed "s/.*-//")
              
              echo "Removing $chart_name version $chart_version from index.yaml"
              
              # Remove the specific version entry
              yq eval --arg chart_name "$chart_name" --arg chart_version "$chart_version" "
                del(.entries[$chart_name][] | select(.version == $chart_version)) |
                # Remove the entire chart entry if no versions remain
                .entries |= with_entries(select(.value | length > 0))
              " index.yaml > index.yaml.tmp
              
              mv index.yaml.tmp index.yaml
            fi
          done

      - name: Commit and push changes
        if: steps.cleanup-charts.outputs.charts_to_remove != ""
        run: |
          if [[ -n "$(git status --porcelain index.yaml)" ]]; then
            git add index.yaml
            git commit -m "Clean up index.yaml by removing non-existent chart entries"
            git push origin gh-pages
            echo "Successfully cleaned up index.yaml"
          else
            echo "No changes needed for index.yaml"
          fi

      - name: Show cleanup summary
        run: |
          echo "=== Cleanup Summary ==="
          if [[ -n "${{ steps.cleanup-charts.outputs.charts_to_remove }}" ]]; then
            echo "Removed charts:"
            echo "${{ steps.cleanup-charts.outputs.charts_to_remove }}" | sed "s/^/- /"
          else
            echo "No charts needed to be removed. Index is up to date."
          fi