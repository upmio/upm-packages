name: Release charts
run-name: ${{ github.actor }} is building charts
on:
  push:
    branches:
      - 'main'

jobs:
  determine-charts:
    runs-on: ubuntu-latest
    outputs:
      chart_dirs: ${{ steps.set-output.outputs.chart_dirs }}
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for chart changes
        id: check-changes
        run: |
          # 检查是否有 charts 相关的文件变更
          if git diff --name-only HEAD^ HEAD | grep -q "charts/"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Chart changes detected"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No chart changes detected, skipping release"
          fi

      - name: Find changed charts directories
        id: set-output
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |        
          # 获取变更的文件列表，找出对应的需要发布的 chart 目录
          changed_files=$(git diff --name-only HEAD^ HEAD | grep "charts/" || true)
          
          if [ -n "$changed_files" ]; then
            echo "Changed files:"
            echo "$changed_files"
            
            # 提取需要发布的 chart 目录
            chart_dirs_json="$(echo "$changed_files" | while read -r file; do
              if [ -n "$file" ]; then
                # 提取 charts 目录
                dir=$(dirname "$file" | sed 's|^\./||')
                while [[ "$dir" != "." && "$dir" != *"charts" ]]; do
                  dir=$(dirname "$dir")
                done
                
                if [[ "$dir" == *"charts" ]]; then
                  echo "$dir"
                fi
              fi
            done | sort | uniq | jq -R . | jq -sc .)"
            
            echo "Chart directories to release:"
            echo "$chart_dirs_json"
            echo "chart_dirs=$chart_dirs_json" >> $GITHUB_OUTPUT
          else
            echo "chart_dirs=[]" >> $GITHUB_OUTPUT
          fi

  release-charts:
    needs: determine-charts
    if: needs.determine-charts.outputs.has_changes == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        chart_dir: ${{ fromJson(needs.determine-charts.outputs.chart_dirs) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git fetch --all
          git fetch --tags

      - name: Check if Chart version exists
        id: check-version
        run: |
          # 读取Chart.yaml中的版本号
          CHART_VERSION=$(yq eval '.version' ${{ matrix.chart_dir }}/Chart.yaml)
          CHART_NAME=$(yq eval '.name' ${{ matrix.chart_dir }}/Chart.yaml)
          
          # 检查是否已存在相同版本的release
          if gh release view "$CHART_NAME-$CHART_VERSION" &> /dev/null; then
            echo "Chart version $CHART_NAME-$CHART_VERSION already exists, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Chart version $CHART_NAME-$CHART_VERSION does not exist, proceeding with release"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Custom packaging
        if: steps.check-version.outputs.skip != 'true'
        run: |
          rm -rf .cr-release-packages
          mkdir -p .cr-release-packages
          helm package ${{ matrix.chart_dir }} --destination=.cr-release-packages -u

      - name: Release Chart
        if: steps.check-version.outputs.skip != 'true'
        uses: helm/chart-releaser-action@v1.5.0
        with:
          charts_dir: ${{ matrix.chart_dir }}
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
