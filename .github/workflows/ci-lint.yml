name: CI Lint

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install hadolint (to avoid Docker build fallback)
        run: |
          sudo wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint

      - name: Install shfmt v3.12.0 (pinned)
        run: |
          SHFMT_VERSION=v3.12.0
          curl -fsSL -o /tmp/shfmt "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION#v}_linux_amd64"
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
          sudo chmod +x /usr/local/bin/shfmt
          shfmt -version

      - name: Run project lint suite
        run: |
          chmod +x scripts/lint.sh
          ./scripts/lint.sh --install-deps

      - name: Publish summary
        if: always()
        run: |
          echo "CI Lint completed with status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
