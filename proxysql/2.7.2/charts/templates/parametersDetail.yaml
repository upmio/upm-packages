apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "Chart.Name" . }}-parameters-detail
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    upm.io/owner: upm
    type: proxysql
    edition: community
    version: {{ .Values.appVersion }}
data:
  proxysql: |
    {{ .Files.Get "files/proxysqlParametersDetail.json" | indent 4 }}
