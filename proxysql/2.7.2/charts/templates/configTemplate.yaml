apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "Chart.Name" . }}-config-template
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    upm.io/owner: upm
    type: proxysql
    edition: community
    version: {{ .Values.appVersion }}
data:
  proxysql: |
    {{ .Files.Get "files/proxysqlTemplate.tpl" | indent 4 }}