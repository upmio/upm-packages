apiVersion: v1
kind: PodTemplate
metadata:
  name: {{ include "Chart.Name" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    upm.io/owner: upm
    type: proxysql
    edition: community
    version: {{ .Values.appVersion }}
template:
  metadata:
    labels:
      upm.io/owner: upm
      type: proxysql
      edition: community
      version: {{ .Values.appVersion }}
  spec:
    tolerations:
      - key: "key"
        operator: "Equal"
        value: "value"
        effect: "NoSchedule"
    dnsPolicy: ClusterFirst
    restartPolicy: Always
    terminationGracePeriodSeconds: 30
    initContainers:
      - name: init-container
        image: {{ include "proxysql.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        command:
          - "bash"
          - "-c"
          - "serverMGR.sh initialize"
        env:
          - name: DATA_DIR
            value: "$(DATA_MOUNT)/data"
          - name: CONF_DIR
            value: "$(DATA_MOUNT)/config"
      - name: sysctl
        image: {{ include "proxysql.image" . }}
        command:
          - "bash"
          - "-c"
          - "ulimit -n 65535"
        securityContext:
          privileged: true
          runAsUser: 0
    containers:
      - name: proxysql
        image: {{ include "proxysql.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: "v1"
                fieldPath: "metadata.name"
          - name: DATA_DIR
            value: "$(DATA_MOUNT)/data"
          - name: CONF_DIR
            value: "$(DATA_MOUNT)/config"
        livenessProbe:
          exec:
            command:
              - "timeout"
              - "3"
              - "bash"
              - "-c"
              - "</dev/tcp/localhost/9001"
          failureThreshold: 3
          initialDelaySeconds: 12
          periodSeconds: 12
          timeoutSeconds: 4
          successThreshold: 1
        ports:
          - containerPort: 6070
            name: metrics
        readinessProbe:
          exec:
            command:
              - "timeout"
              - "3"
              - "bash"
              - "-c"
              - "mysqladmin --defaults-file=${CONF_DIR}/.stats.cnf status"
          failureThreshold: 3
          initialDelaySeconds: 12
          periodSeconds: 12
          timeoutSeconds: 4
          successThreshold: 1
        startupProbe:
          exec:
            command:
              - "timeout"
              - "3"
              - "bash"
              - "-c"
              - "</dev/tcp/localhost/9001"
          failureThreshold: 3
          initialDelaySeconds: 12
          periodSeconds: 12
          timeoutSeconds: 4
          successThreshold: 1
      - name: unit-agent
        image: {{ include "proxysql.agent.image" . }}
        imagePullPolicy: {{ .Values.agent.image.pullPolicy | quote }}
        ports:
          - containerPort: 2214
            name: unit-agent
        env:
          - name: DATA_DIR
            value: "$(DATA_MOUNT)/data"
          - name: CONF_DIR
            value: "$(DATA_MOUNT)/config"
          - name: CONFIG_PATH
            value: "$(DATA_MOUNT)/config/proxysql.cnf"
          - name: METRICS_PORT
            value: "6070"
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: "v1"
                fieldPath: "metadata.namespace"
          - name: PROXYSQL_CPU_LIMIT
            valueFrom:
              resourceFieldRef:
                containerName: "proxysql"
                resource: "limits.cpu"
                divisor: "1"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi